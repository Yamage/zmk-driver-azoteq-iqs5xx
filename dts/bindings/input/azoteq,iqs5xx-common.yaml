properties:
  rdy-gpios:
    type: phandle-array
    description: "Data Ready pin for the Azoteq IQS5xx trackpad"
  
  reset-gpios:
    type: phandle-array
    description: "Reset pin for the Azoteq IQS5xx trackpad"

  one-finger-tap:
    type: boolean
    description: "Register single finger tap gestures and report them as a left click"

  press-and-hold:
    type: boolean
    description: "Register press and hold gestures and report them as a left click until released"
  
  press-and-hold-time:
    type: int
    description: "Time in ms (in addition to the tap time) it takes to register a press and hold gesture"
    default: 250

  two-finger-tap:
    type: boolean
    description: "Register two finger tap gestures and report them as a right click"
  
  scroll:
    type: boolean
    description: "Register and report scroll gestures, both vertical and horizontal scroll is supported"

  natural-scroll-x:
    type: boolean
    description: "Whether content should track finger movement when scrolling on the x axis."

  natural-scroll-y:
    type: boolean
    description: "Whether content should track finger movement when scrolling on the y axis."

  switch-xy:
    type: boolean
    description: "Flip x and y axes"
  
  flip-x:
    type: boolean
    description: "Invert the direction of the x axis"

  flip-y:
    type: boolean
    description: "Invert the direction of the y axis"

  bottom-beta:
    type: int
    description: |
      Amount of filtering applied at slow speeds.
      0: Most filtering, smoother, but laggier.
      255: Least filtering, least smooth, more responsive.
    default: 5
  
  stationary-threshold:
    type: int
    description: |
      How far a finger must move (in pixels) to not be considered stationary.
    default: 5

  active-report-rate:
    type: int
    description: |
      Active mode report rate in milliseconds. Lower values produce a smoother,
      more responsive cursor (e.g. 7 ~= 143 Hz, 5 = 200 Hz). 0 keeps the chip
      default (10 ms / 100 Hz).
    default: 0

  x-resolution:
    type: int
    description: |
      Trackpad X resolution (max coordinate). Higher values give the chip finer
      internal tracking, producing smoother slow movement (less "staircase")
      at the cost of higher effective sensitivity; compensate the cursor speed
      with an input-processor scaler. 0 keeps the chip default.
    default: 0

  y-resolution:
    type: int
    description: |
      Trackpad Y resolution (max coordinate). See x-resolution. 0 keeps the
      chip default.
    default: 0

  inertia-cursor:
    type: boolean
    description: |
      Enable trackball-like inertia for cursor movement: when the finger is
      lifted the cursor keeps moving at the release velocity and decays with
      friction. Touching the pad again stops it instantly.

  inertia-scroll:
    type: boolean
    description: |
      Enable inertia for scrolling (flick scroll): a two-finger scroll keeps
      coasting after the fingers are lifted, decaying with friction.

  inertia-friction:
    type: int
    description: |
      Fraction of the velocity retained each glide tick, out of 256. Larger =
      longer glide (less friction). 242 ~= 0.945 gives roughly a 0.6 s glide.
    default: 242

  inertia-min-speed:
    type: int
    description: |
      Minimum release speed (in counts per report) required to start a glide.
      Slower lifts stop immediately, preventing drift.
    default: 2

  inertia-tick-ms:
    type: int
    description: |
      Interval in ms between synthetic glide reports while coasting.
    default: 8
